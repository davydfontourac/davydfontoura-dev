name: Sync Notion Images

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.local for script
        run: |
          echo "VITE_NOTION_API_KEY=${{ secrets.VITE_NOTION_API_KEY }}" > .env.local
          echo "VITE_NOTION_DATABASE_ID=${{ secrets.VITE_NOTION_DATABASE_ID }}" >> .env.local

      - name: Run Sync Script
        run: npm run sync-images

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync and optimize notion images [skip ci]"
          file_pattern: 'public/images/*'
